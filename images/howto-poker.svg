<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 440" width="320" height="440">
  <defs>
    <radialGradient id="felt" cx="0.5" cy="0.4" r="0.75"><stop offset="0" stop-color="#12703f"/><stop offset="1" stop-color="#063a20"/></radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9edf0"/></linearGradient>
    <radialGradient id="chipR" cx="0.4" cy="0.35" r="0.7"><stop offset="0" stop-color="#e74c3c"/><stop offset="1" stop-color="#a5281b"/></radialGradient>
    <radialGradient id="chipB" cx="0.4" cy="0.35" r="0.7"><stop offset="0" stop-color="#3d8fd6"/><stop offset="1" stop-color="#1f5f9e"/></radialGradient>
    <radialGradient id="chipG" cx="0.4" cy="0.35" r="0.7"><stop offset="0" stop-color="#34b36a"/><stop offset="1" stop-color="#1e7a45"/></radialGradient>
  </defs>
  <rect width="320" height="440" rx="16" fill="url(#felt)"/>
  <rect x="8" y="8" width="304" height="424" rx="12" fill="none" stroke="rgba(212,175,55,.45)" stroke-width="2"/>
  <text x="160" y="250" font-family="Georgia, serif" font-size="230" fill="rgba(255,255,255,.06)" text-anchor="middle" dominant-baseline="middle">♠</text>

  <!-- fanned hole cards -->
  <g transform="translate(96 96) rotate(-14)">
    <rect width="120" height="168" rx="12" fill="url(#card)" stroke="#cfd6db" stroke-width="1.5"/>
    <text x="16" y="42" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#c0392b">A</text>
    <text x="60" y="104" font-family="Georgia, serif" font-size="64" fill="#c0392b" text-anchor="middle">♥</text>
    <text x="104" y="156" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#c0392b" text-anchor="end" transform="rotate(180 104 144)">A</text>
  </g>
  <g transform="translate(150 92) rotate(12)">
    <rect width="120" height="168" rx="12" fill="url(#card)" stroke="#cfd6db" stroke-width="1.5"/>
    <text x="16" y="42" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#1a1a1a">A</text>
    <text x="60" y="104" font-family="Georgia, serif" font-size="64" fill="#1a1a1a" text-anchor="middle">♠</text>
    <text x="104" y="156" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#1a1a1a" text-anchor="end" transform="rotate(180 104 144)">A</text>
  </g>

  <!-- chip stacks -->
  <g>
    <g transform="translate(80 372)">
      <ellipse cx="0" cy="18" rx="46" ry="16" fill="url(#chipR)"/>
      <ellipse cx="0" cy="9" rx="46" ry="16" fill="url(#chipR)" stroke="#fff" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="46" ry="16" fill="url(#chipR)" stroke="#fff" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="26" ry="9" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="2"/>
    </g>
    <g transform="translate(168 384)">
      <ellipse cx="0" cy="18" rx="46" ry="16" fill="url(#chipB)"/>
      <ellipse cx="0" cy="9" rx="46" ry="16" fill="url(#chipB)" stroke="#fff" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="46" ry="16" fill="url(#chipB)" stroke="#fff" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="26" ry="9" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="2"/>
    </g>
    <g transform="translate(238 374)">
      <ellipse cx="0" cy="9" rx="44" ry="15" fill="url(#chipG)"/>
      <ellipse cx="0" cy="0" rx="44" ry="15" fill="url(#chipG)" stroke="#fff" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="25" ry="8" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="2"/>
    </g>
  </g>
</svg>
